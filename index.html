<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>



    <!-- tailwind+daisyUi -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google fonts  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <!-- font awesome icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />


    <style>
        * {
            font-family: "Outfit", sans-serif;
        }
    </style>
</head>

<body class=" bg-base-200">


    <section class=" bg-base-400 mx-auto">



        <div class="form py-4">
            <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow mx-auto rounded-2xl">


                <div class="logo mx-auto pt-4">
                    <img class="mx-auto" src="./assets/github-logo.png" alt="">
                    <h2 class="mt-8 text-xl font-bold text-center">GitHub Issues Tracker</h2>
                    <p class="text-[#64748B]">Sign in to manage your issues</p>
                </div>


                <div class="card-body">
                    <fieldset class="fieldset">
                        <label class="label text-neutral font-bold">Username</label>
                        <input id="input-user-name" type="text" class="input rounded-lg bg-base-200" value="admin"
                            placeholder="Enter Username" />

                        <br>

                        <label class="label text-neutral font-bold">Password</label>
                        <input id="input-password" type="password" class=" input rounded-lg bg-base-200"
                            value="admin123" placeholder="Enter Password" />

                        <button id="login-btn" class="btn btn-primary mt-4 mr-4 rounded-lg">Sign In</button>
                    </fieldset>
                </div>

                <div class="py-5 mx-auto">


                    <p class="text-[#64748B] mb-6 text-center">Demo Credentials:</p>
                    <div class="bg-base-300 py-4 card w-82 rounded-sm">
                        <h4 class="text-center">Username: <span class="text-[#64748B]">admin</span></h4>
                        <h4 class="text-center">Password: <span class="text-[#64748B]">admin123</span></h4>
                    </div>
                </div>


            </div>
        </div>

    </section>




    <!-- JavaScript Connecting -->
    <script src="./scripts/index.js"></script>
</body>

</html>
