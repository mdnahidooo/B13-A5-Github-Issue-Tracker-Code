<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>



    <!-- tailwind+daisyUi -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google fonts  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <!-- font awesome icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />


    <style>
        * {
            font-family: "Outfit", sans-serif;
        }
    </style>
</head>

<body class="min-h-screen w-full bg-base-200">

    <header class="bg-white shrink-0 shadow md:flex justify-between items-center py-5 px-20 mb-16">
        <!-- logo  -->
        <div class="flex items-center gap-2">
            <img class="w-9" src="./assets/github-logo.png" alt="">
            <h2 class="text-xl font-bold">GitHub Issues Tracker</h2>
        </div>


        <div class="flex md:justify-between items-center gap-2">

            <label class="input">
                <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                        stroke="currentColor">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.3-4.3"></path>
                    </g>
                </svg>
                <input type="search" required placeholder="Search issues..." />
            </label>



            <button class="btn btn-active btn-primary"><i class="fa-solid fa-plus"></i>New Issue</button>
        </div>

    </header>


    <main class="w-11/12 mx-auto">

        <!-- tab sections  -->
        <section id="tab-sections" class="bg-white p-6 gap-4 mb-4 rounded-lg">
            <button id="all-tab" class="btn btn-active btn-primary">All</button>
            <button id="open-tab" class="btn btn-active btn-outline">Open</button>
            <button id="closed-tab" class="btn btn-active btn-outline">Closed</button>

        </section>

        <section class="bg-white p-6 gap-4  rounded-t-lg md:flex items-center justify-between">
            <div class="flex items-center gap-2">
                <img class="w-12" src="./assets/Aperture.png" alt="">
                <div>
                    <h2 id="count" class="text-xl font-bold">0 Issues</h2>
                    <p class="text-[#64748B]">Track and manage your project issues</p>
                </div>
            </div>

            <div class="flex sm:gap-10 justify-end md:justify-between items-center gap-4">
                <div class="flex items-center gap-2">
                    <span class="w-4 h-4 rounded-full bg-green-500"></span>
                    <p>Open</p>
                </div>
                <div class="flex items-center gap-2">
                    <span class="w-4 h-4 rounded-full bg-purple-500"></span>
                    <p>Closed</p>
                </div>
            </div>

        </section>


        <!-- card section  -->
        <section id="card-section" class="grid md:grid-cols-4 p-4 bg-base-500 shrink-0 shadow gap-4">


        </section>



        <!-- loading section  -->
        <section id="loading-spinner" class="hidden bg-white p-6 gap-4  rounded-t-lg flex items-center justify-center">
            <span class="loading loading-spinner loading-xl"></span>

        </section>






    </main>



    <!-- javascript connection -->
    <script type="module" src="./scripts/main.js"></script>
</body>

</html>
